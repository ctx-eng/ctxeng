name: Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with vector extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[retrieval,test]"

      - name: Run benchmarks
        run: |
          python -m ctxeng.eval benchmark --json benchmark-results.json

      - name: Check thresholds
        run: |
          python -m ctxeng.eval check \
            --json benchmark-results.json \
            --threshold avg_precision_at_1=0.3 \
            --threshold avg_recall_at_5=0.4 \
            --threshold mrr=0.5

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.python-version }}
          path: benchmark-results.json
