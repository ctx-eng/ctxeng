<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CtxEng Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5; display: flex; justify-content: center; min-height: 100vh;
  }
  .app { width: 800px; max-width: 100%; display: flex; flex-direction: column; height: 100vh; }
  header {
    background: #1a1a2e; color: #eee; padding: 16px 20px; display: flex;
    justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: .8rem; opacity: .7; }
  .chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: .9rem; }
  .msg.user { background: #1a1a2e; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.assistant { background: #fff; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .msg.system { background: #f0f0f0; color: #666; align-self: center; font-size: .8rem; font-style: italic; border-radius: 6px; }
  .input-area { border-top: 1px solid #ddd; padding: 12px 20px; background: #fff; display: flex; gap: 8px; }
  .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; outline: none; }
  .input-area input:focus { border-color: #1a1a2e; }
  .input-area button { padding: 10px 20px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: .9rem; }
  .input-area button:disabled { opacity: .5; cursor: not-allowed; }
  .trace-toggle { font-size: .75rem; color: #888; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>CtxEng</h1>
    <span>context-engineered chat</span>
  </header>
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <input id="input" type="text" placeholder="Type a message..." autofocus>
    <button id="send" onclick="send()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let messages = [];

function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);

  sendBtn.disabled = true;
  try {
    // Build prompt via context manager
    const promptResp = await fetch('/prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: 'web-user',
        turns: messages.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content })),
        current_query: text
      })
    });
    const promptData = await promptResp.json();
    addMsg('system', '[context assembled]');

    // Get LLM reply via proxy
    const chatResp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: promptData.prompt },
          { role: 'user', content: text }
        ]
      })
    });
    const chatData = await chatResp.json();
    addMsg('assistant', chatData.content);
    messages.push({ role: 'user', content: text });
    messages.push({ role: 'assistant', content: chatData.content });
  } catch (e) {
    addMsg('assistant', 'Error: ' + e.message);
  }
  sendBtn.disabled = false;
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
